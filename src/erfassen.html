<!DOCTYPE html>

<html lang="de">
  <head>
    <link href="/public/css/simple.min.css" rel="stylesheet">
    <link href="/public/css/fm-kontakte.css" rel="stylesheet">
    <meta charset="utf-8">
    <title>Future Message</title>
  </head>
  <body>
    <h1>Nachricht erfassen</h1>

    <form method="post">
      <label for="empfaenger">Empfänger:</label>
      <input id="empfaenger-eingabe" name="empfaenger" type="text">
      <input id="kontakte-schalter" type="button" value="..."">
      <br>

      <label for="text">Text:</label>
      <textarea name="text" cols="40" rows="10"></textarea>
      <br>

      <label for="datum">Datum:</label>
      <input name="datum" type="date">
      <br>

      <label for="zeit">Zeit:</label>
      <input name="zeit" type="time">
      <br>

      <input type="submit" value="Erfassen">
      <input type="reset" value="Zurücksetzen">
    </form>

    <a href="/">Zurück zur Startseite</a>

    <div class="hidden" id="kontakte-fenster">
      <input id="kontakte-eingabe" placeholder="Kontakt suchen ..." type="text"/>
      <ul id="kontakte-liste"></ul>
    </div>

    <script src="/public/js/fm-kontakte.js"></script>
  </body>
</html>
