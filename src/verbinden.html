<!DOCTYPE html>

<html lang="de">
  <head>
    <link href="/public/css/simple.min.css" rel="stylesheet">
    <link href="/public/css/fm-karten.css" rel="stylesheet">
    <link href="/public/css/fm-navigation.css" rel="stylesheet">
    <link href="/public/css/fm-schriftart.css" rel="stylesheet">
    <link href="/public/css/fm-variablen.css" rel="stylesheet">
    <meta charset="utf-8">
    <title>Future Message</title>
  </head>
  <body>
    <div class="navigation-oben">
      <h1>Gerät verbinden</h1>
    </div>

    <ul class="karten-liste">
      <li>
        <div>
          Bitte scanne den QR-Code:
        </div>
        <div>
          <img class="qrcode" src="{link_bild}">
        </div>
      </li>
    </ul>

    <div class="navigation-unten">
      <a class="center" href="/">Zurück zur Startseite</a>
    </div>

    <script>
      async function warten() {
        const antwort = await fetch("/verbinden/warten", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            link: "{link_text}"
          })
        });

        if (antwort.ok) {
          window.location = "/verbinden-erfolgreich";
        } else {
          window.location = "/verbinden-erfolglos";
        }
      }

      warten();
    </script>
  </body>
</html>
